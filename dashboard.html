<!DOCTYPE html>
<html>
<head>
    <title>IPL 2026 Leaderboard</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Arial'; text-align: center; }
        table { width: 60%; margin: 50px auto; border-collapse: collapse; background: #1e293b; }
        th, td { padding: 15px; border: 1px solid #334155; }
        th { background-color: #eab308; color: black; }
    </style>
</head>
<body>

    <h1>IPL 2026 POINTS TABLE</h1>

    <table>
        <thead>
            <tr>
                <th>s.no</th>
                <th>User</th>
           
            </tr>
            </thead>
            <tr>
                <td> 1</td>
                <td class="team" data-team-id="riya">riyaa</td>
            
            </tr>
            <tr>
                <td> 2</td>
                <td class="team" data-team-id="manish">manish</td>
             
            </tr>
            <tr>
                <td>3</td>
                <td class="team" data-team-id="naruu">naresh</td>
          
            </tr>
            <tr><td>4</td>
                <td class="team" data-team-id="bharat">bharat</td>

                </tr>   
    </table>




<script>
  // Select all elements with class 'team'
  const teamButtons = document.querySelectorAll('.team');

  teamButtons.forEach(button => {
    button.addEventListener('click', () => {
     
      const teamId = button.getAttribute('data-team-id');
      
      window.location.href = `teams.html#${teamId}`;
    });
  });


</script>

    
</body>
</html>
